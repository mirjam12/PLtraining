<!DOCTYPE html>
<html>
<head>
    <title>Workout Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #ffe4ec;
            padding: 20px;
            color: #5c3d4a;
        }

        .card {
            background: #fff8fb;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 12px rgba(255, 182, 193, 0.3);
            width: 350px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid #f4b6c2;
        }

        button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            border: none;
            background: #ffb6c1;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #ff9eb5;
        }

        #chart-wrapper {
            width: 90%;
            max-width: 600px;
            height: 400px;
            background: #fff8fb;
            padding: 20px;
            border-radius: 16px;
            position: relative;
        }
    
    </style>
</head>

<body>

<div id="auth-section" class="card">
    <h2>Login / Sign Up</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="handleLogin()">Login</button>
    <button onclick="handleSignUp()" style="background: gray;">Sign Up</button>
</div>

<div id="main-section" style="display:none; width:100%; max-width:600px;">

    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Workout Tracker</h2>
        <button onclick="handleLogout()" style="background:red; width:auto;">Logout</button>
    </div>

    <div class="card">
        <input type="text" id="ui_exercise" placeholder="Exercise" oninput="loadTrends()">
        <input type="number" id="ui_weight" placeholder="Weight (kg)">
        <input type="number" id="ui_reps" placeholder="Reps">
        <input type="number" id="ui_rpe" placeholder="RPE (6-10)">
        <button onclick="saveToDatabase()">Calculate & Save</button>
    </div>

    <div id="chart-wrapper">
        <canvas id="strengthChart"></canvas>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = 'https://ytlrutgvhvcxlnwmniad.supabase.co';
const SUPABASE_KEY = 'sb_publishable_mdVUFmfixzh8L-NxvcREsA_tizbBXk_';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let myChart;

// AUTH
window.onload = async () => {
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) showMain();
};

async function handleSignUp() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { error } = await _supabase.auth.signUp({ email, password });
    if (error) alert(error.message);
    else alert("Check your email for the confirmation link!");
}

async function handleLogin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { error } = await _supabase.auth.signInWithPassword({ email, password });
    if (error) alert(error.message);
    else showMain();
}

function showMain() {
    document.getElementById("auth-section").style.display = "none";
    document.getElementById("main-section").style.display = "block";
    loadTrends();
}

function handleLogout() {
    _supabase.auth.signOut();
    location.reload();
}

// LOAD DATA
async function loadTrends() {
    const { data: { user } } = await _supabase.auth.getUser();
    const exercise = document.getElementById("ui_exercise").value;

    if (!user || !exercise) return;

    const res = await fetch(`/get_trends?user_id=${user.id}`);
    const data = await res.json();

    const filtered = data.filter(r =>
        r.exercise.toLowerCase() === exercise.toLowerCase()
    );

    const labels = filtered.map(r => new Date(r.created_at).toLocaleDateString());
    const values = filtered.map(r => r["one_rm"]);

    const ctx = document.getElementById("strengthChart").getContext("2d");

    if (myChart) myChart.destroy();

    myChart = new Chart(ctx, {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: exercise + " one_rm",
                data: values,
                borderColor: "#007bff",
                fill: true
            }]
        }
    });
}

// SAVE DATA
async function saveToDatabase() {
    const { data: { user } } = await _supabase.auth.getUser();

    const payload = {
        exercise: document.getElementById("ui_exercise").value,
        weight: document.getElementById("ui_weight").value,
        reps: document.getElementById("ui_reps").value,
        rpe: document.getElementById("ui_rpe").value,
        user_id: user.id
    };

    const res = await fetch("/add_workout", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    const result = await res.json();

    if (result.status === "success") {
        loadTrends();
    } else {
        alert(result.message);
    }
}
</script>

</body>
</html>
